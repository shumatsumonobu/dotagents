<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TODO Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; color: #000; background: #fff; padding: 20px; }
    h1 { font-size: 20px; border-bottom: 1px solid #000; padding-bottom: 8px; margin-bottom: 16px; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card { border: 1px solid #000; padding: 12px 16px; min-width: 120px; }
    .stat-card .label { font-size: 12px; }
    .stat-card .value { font-size: 24px; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    th, td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 14px; }
    th { font-weight: bold; }
    .actions { margin-top: 16px; }
    .btn { border: 1px solid #000; background: #fff; padding: 6px 16px; font-size: 14px; cursor: pointer; }
    .filter { margin-bottom: 16px; }
    .filter select, .filter input { border: 1px solid #000; padding: 4px 8px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>TODO Dashboard</h1>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Total</div>
      <div class="value">42</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed</div>
      <div class="value">28</div>
    </div>
    <div class="stat-card">
      <div class="label">Overdue</div>
      <div class="value">3</div>
    </div>
    <div class="stat-card">
      <div class="label">High Priority</div>
      <div class="value">7</div>
    </div>
  </div>

  <div class="filter">
    <select>
      <option>All</option>
      <option>Completed</option>
      <option>Incomplete</option>
    </select>
    <select>
      <option>All Priorities</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
    <input type="text" placeholder="Search...">
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:40px">ID</th>
        <th>Title</th>
        <th style="width:80px">Priority</th>
        <th style="width:100px">Due Date</th>
        <th style="width:80px">Status</th>
        <th style="width:100px">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Setup project structure</td>
        <td>high</td>
        <td>2026-04-15</td>
        <td>completed</td>
        <td><button class="btn">Edit</button></td>
      </tr>
      <tr>
        <td>2</td>
        <td>Implement authentication</td>
        <td>high</td>
        <td>2026-04-18</td>
        <td>incomplete</td>
        <td><button class="btn">Edit</button></td>
      </tr>
      <tr>
        <td>3</td>
        <td>Write unit tests</td>
        <td>medium</td>
        <td>2026-04-20</td>
        <td>incomplete</td>
        <td><button class="btn">Edit</button></td>
      </tr>
    </tbody>
  </table>

  <div class="actions">
    <button class="btn">+ New TODO</button>
  </div>
</body>
</html>
